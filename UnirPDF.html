<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unir PDFs en el Navegador</title>

    <!-- PDF-LIB -->
    <script src="pdf-lib.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="theme.js"></script>

</head>

<body>

    <header>
        <h1>Unir PDFs</h1>
        <button class="theme-toggle" id="themeToggle" title="Alternar modo oscuro">
            <svg id="moonIcon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </header>

    <div class="content-wrapper">
        <div class="back-link-container">
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al menú
            </a>
        </div>

        <div id="dropzone">Arrastra aquí tus PDFs o haz clic para seleccionarlos</div>
        <input type="file" id="fileInput" accept="application/pdf" multiple style="display:none">

        <div id="fileList">
            <h3 style="margin-bottom: 6px; color: var(--h1-color); font-weight: 600;">Archivos cargados:</h3>
            <p class="hint-text">💡 Una vez subidos, arrastra desde el icono de la izquierda para reordenar</p>
            <ul id="list"></ul>
        </div>

        <button id="mergeBtn">Unir PDFs</button>
        <div id="progressText"></div>
    </div>

    <script>
        // --- PDF Merge Logic ---
        const dropzone = document.getElementById("dropzone");
        const fileInput = document.getElementById("fileInput");
        const list = document.getElementById("list");
        const mergeBtn = document.getElementById("mergeBtn");
        const progressText = document.getElementById("progressText");

        // El mapa nos permite recuperar el File original a partir del elemento <li> del DOM
        const fileMap = new WeakMap();

        // Drag state para reordenar
        let dragSrcLi = null;

        dropzone.addEventListener("click", () => fileInput.click());
        dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
        dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
        dropzone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropzone.classList.remove("dragover");
            addFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener("change", (e) => addFiles(e.target.files));

        function addFiles(files) {
            for (let file of files) {
                if (file.type !== "application/pdf") continue;

                const li = document.createElement("li");
                li.draggable = true;


                const fileName = document.createElement("span");
                fileName.textContent = file.name;
                fileName.style.flex = "1";

                const deleteBtn = document.createElement("button");
                deleteBtn.innerHTML = "X";
                deleteBtn.className = "delete-btn";
                deleteBtn.title = "Eliminar";
                deleteBtn.addEventListener("click", () => {
                    list.removeChild(li);
                    updateLiLabels();
                });


                // Controles de Ordenación Numérica (Mejora para móviles)
                const controls = document.createElement('div');
                controls.className = 'order-controls';
                controls.style.width = 'auto';
                controls.style.margin = '0 15px';

                const btnUp = document.createElement('button');
                btnUp.type = 'button';
                btnUp.className = 'order-btn';
                btnUp.innerHTML = '↑';
                btnUp.onclick = (e) => { e.preventDefault(); e.stopPropagation(); moveLi(li, -1); };

                const input = document.createElement('input');
                input.type = 'number';
                input.inputMode = 'numeric';
                input.className = 'order-input';
                input.value = list.children.length + 1;
                input.min = 1;
                input.onclick = (e) => e.stopPropagation();
                input.onchange = (e) => updateLiFromInput(li, e.target.value);

                const btnDown = document.createElement('button');
                btnDown.type = 'button';
                btnDown.className = 'order-btn';
                btnDown.innerHTML = '↓';
                btnDown.onclick = (e) => { e.preventDefault(); e.stopPropagation(); moveLi(li, 1); };

                controls.appendChild(btnUp);
                controls.appendChild(input);
                controls.appendChild(btnDown);
                li.appendChild(controls);

                li.appendChild(fileName);
                li.appendChild(deleteBtn);
                list.appendChild(li);
                updateLiLabels();

                // Guardar referencia al File en el WeakMap
                fileMap.set(li, file);

                // Eventos drag & drop para reordenar
                li.addEventListener("dragstart", () => {
                    dragSrcLi = li;
                    setTimeout(() => li.classList.add("dragging"), 0);
                });
                li.addEventListener("dragend", () => {
                    li.classList.remove("dragging");
                    document.querySelectorAll("#list li").forEach(el => el.classList.remove("drag-over-li"));
                });
                li.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    if (li !== dragSrcLi) li.classList.add("drag-over-li");
                });
                li.addEventListener("dragleave", () => li.classList.remove("drag-over-li"));
                li.addEventListener("drop", (e) => {
                    e.stopPropagation();
                    li.classList.remove("drag-over-li");
                    if (dragSrcLi && dragSrcLi !== li) {
                        const rect = li.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        if (e.clientY < midY) {
                            list.insertBefore(dragSrcLi, li);
                        } else {
                            list.insertBefore(dragSrcLi, li.nextSibling);
                        }
                    }
                });

                // --- Soporte para dispositivos táctiles ---
                li.addEventListener("touchstart", onTouchStart, { passive: false });
                li.addEventListener("touchmove", onTouchMove, { passive: false });
                li.addEventListener("touchend", onTouchEnd);
            }
        }

        // Unir PDFs respetando el orden actual del DOM
        mergeBtn.addEventListener("click", async () => {
            const listItems = Array.from(list.querySelectorAll("li"));
            if (listItems.length === 0) {
                alert("No has añadido ningún PDF.");
                return;
            }

            mergeBtn.disabled = true;
            progressText.style.display = "block";

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                const total = listItems.length;

                for (let i = 0; i < total; i++) {
                    const file = fileMap.get(listItems[i]);
                    progressText.textContent = `Procesando archivo ${i + 1} de ${total}: ${file.name}`;

                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(p => mergedPdf.addPage(p));
                }

                progressText.textContent = "Generando PDF final...";
                const mergedBytes = await mergedPdf.save();

                const blob = new Blob([mergedBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "PDF_Unido.pdf";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                progressText.textContent = "¡PDF unido descargado con éxito!";
                setTimeout(() => { progressText.style.display = "none"; }, 3000);

            } catch (err) {
                alert("Error al unir los PDFs.");
                console.error(err);
                progressText.textContent = "Error en el proceso.";
            } finally {
                mergeBtn.disabled = false;
            }
        });

        // --- Soporte para dispositivos táctiles ---
        function onTouchStart(e) {
            // Usamos closest para detectar si el toque fue en el handle
            const handle = e.target.closest('.drag-handle-icon');
            if (handle) {
                dragSrcLi = this;
                this.classList.add("dragging");
            }
        }

        function onTouchMove(e) {
            if (!dragSrcLi) return;

            // Prevenir scroll mientras se arrastra
            e.preventDefault();

            const touch = e.touches[0];
            
            // Usamos elementsFromPoint para obtener todos los elementos bajo el dedo
            const elements = document.elementsFromPoint(touch.clientX, touch.clientY);
            
            // Buscamos el elemento LI sobre el que estamos (que no sea el propio LI que arrastramos)
            let liTarget = null;
            for (const el of elements) {
                const li = el.closest('li');
                if (li && li !== dragSrcLi) {
                    liTarget = li;
                    break;
                }
            }

            if (liTarget) {
                const rect = liTarget.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;

                if (touch.clientY < midY) {
                    list.insertBefore(dragSrcLi, liTarget);
                } else {
                    list.insertBefore(dragSrcLi, liTarget.nextSibling);
                }
            }
        }

        function onTouchEnd() {
            if (dragSrcLi) {
                dragSrcLi.classList.remove("dragging");
                dragSrcLi = null;
            }
        }

        // Funciones para ordenación numérica (Móviles) - Lógica Robusta
        function updateLiLabels() {
            const items = list.querySelectorAll("li");
            items.forEach((li, index) => {
                const input = li.querySelector(".order-input");
                if (input) {
                    input.value = index + 1;
                    input.max = items.length;
                }
            });
        }

        function moveLi(li, direction) {
            if (direction > 0) {
                const next = li.nextElementSibling;
                if (next) next.after(li);
            } else {
                const prev = li.previousElementSibling;
                if (prev) prev.before(li);
            }
            updateLiLabels();
        }

        function updateLiFromInput(li, newValue) {
            const items = Array.from(list.children);
            let newIndex = parseInt(newValue) - 1;
            
            if (isNaN(newIndex) || newIndex < 0 || newIndex >= items.length) {
                updateLiLabels();
                return;
            }
            
            const currentIndex = items.indexOf(li);
            if (newIndex === currentIndex) return;

            const target = items[newIndex];
            if (newIndex > currentIndex) {
                target.after(li);
            } else {
                target.before(li);
            }
            updateLiLabels();
        }

    </script>
</body>

</html>
