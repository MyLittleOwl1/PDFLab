<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girar PDF en el Navegador</title>

    <!-- PDF-LIB -->
    <script src="pdf-lib.min.js"></script>
    <!-- PDF.js para la previsualización -->
    <script src="pdf.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="theme.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';</script>
    <style>
        #previewPanel {
            display: none;
            margin-top: 20px;
        }
        #previewPanel .preview-inner {
            border: 1px solid var(--file-item-border);
            border-radius: 10px;
            padding: 16px;
            background: var(--panel-bg);
            text-align: center;
        }
        #previewPanel h3 {
            color: var(--h1-color);
            margin-bottom: 12px;
        }
        #previewCanvas {
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #previewPanel p {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 8px;
            color: var(--text-color);
        }
        .preview-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .btn-download {
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel {
            background: transparent;
            border: 2px solid var(--file-item-border);
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <h1>Girar PDF</h1>
        <button class="theme-toggle" id="themeToggle" title="Alternar modo oscuro">
            <svg id="moonIcon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </header>

    <div class="content-wrapper">
        <div class="back-link-container">
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al menú
            </a>
        </div>

        <div id="dropzone">
            Arrastra y suelta tu archivo PDF aquí<br>o haz clic para seleccionar
            <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
        </div>

        <div id="optionsPanel" class="panel" style="display: none;">
            <div class="file-item">
                <span id="fileNameDisplay">documento.pdf</span>
                <span style="font-size: 14px; opacity: 0.8; margin-left: auto; margin-right: 15px;" id="pageCountDisplay"></span>
                <button class="delete-btn" id="removeFileBtn" title="Eliminar archivo">X</button>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--file-item-border); padding-top: 15px;">
                <h3 style="margin-bottom: 15px; color: var(--h1-color);">1. Opciones de Páginas</h3>
                <label class="radio-label">
                    <input type="radio" name="pageMode" value="all" checked>
                    Girar todas las páginas del documento
                </label>
                <label class="radio-label">
                    <input type="radio" name="pageMode" value="specific">
                    Girar páginas específicas o rangos
                </label>

                <div id="rangeInputContainer" style="display: none; margin-left: 25px; margin-top: 10px;">
                    <label style="color: var(--text-color); font-size: 14px; display: block; margin-bottom: 5px;">
                        Páginas a girar (ej: 1, 3, 5-10):
                    </label>
                    <input type="text" id="pageRangeInput" placeholder="1, 3, 5-10" style="padding: 8px; border-radius: 5px; border: 1px solid var(--file-item-border); background: var(--bg-color); color: var(--text-color); width: 100%; max-width: 300px; font-size: 16px;">
                    <div id="rangeError" style="color: #dc3545; font-size: 14px; margin-top: 5px; display: none;">Rango inválido. Asegúrate de usar el formato correcto.</div>
                </div>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--file-item-border); padding-top: 15px;">
                <h3 style="margin-bottom: 15px; color: var(--h1-color);">2. Ángulo de Giro</h3>
                <label class="radio-label">
                    <input type="radio" name="rotationAngle" value="90" checked>
                    90º a la derecha (Sentido horario)
                </label>
                <label class="radio-label">
                    <input type="radio" name="rotationAngle" value="-90">
                    90º a la izquierda (Antihorario)
                </label>
                <label class="radio-label">
                    <input type="radio" name="rotationAngle" value="180">
                    180º (Dar la vuelta)
                </label>
            </div>
        </div>

        <button id="actionBtn" style="display: none;">Aplicar Giro y Ver Previsualización</button>

        <!-- Panel de Previsualización -->
        <div id="previewPanel">
            <div class="preview-inner">
                <h3>Vista previa (página 1)</h3>
                <canvas id="previewCanvas"></canvas>
                <p>Comprueba el resultado antes de descargarlo.</p>
                <div class="preview-actions">
                    <button class="btn-download" id="downloadBtn">⬇ Descargar PDF</button>
                    <button class="btn-cancel" id="cancelPreviewBtn">✕ Descartar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Girar PDF Logic ---
        const dropzone = document.getElementById("dropzone");
        const fileInput = document.getElementById("fileInput");
        const optionsPanel = document.getElementById("optionsPanel");
        const fileNameDisplay = document.getElementById("fileNameDisplay");
        const removeFileBtn = document.getElementById("removeFileBtn");
        const actionBtn = document.getElementById("actionBtn");
        const pageCountDisplay = document.getElementById("pageCountDisplay");
        const rangeInputContainer = document.getElementById("rangeInputContainer");
        const pageRangeInput = document.getElementById("pageRangeInput");
        const rangeError = document.getElementById("rangeError");
        const previewPanel = document.getElementById("previewPanel");
        const previewCanvas = document.getElementById("previewCanvas");
        const downloadBtn = document.getElementById("downloadBtn");
        const cancelPreviewBtn = document.getElementById("cancelPreviewBtn");
        
        const pageModeRadios = document.getElementsByName("pageMode");

        let currentFile = null;
        let totalPages = 0;
        let fileBytes = null;
        let pendingBlob = null;

        for (let radio of pageModeRadios) {
            radio.addEventListener('change', () => {
                if (radio.value === 'specific') {
                    rangeInputContainer.style.display = 'block';
                } else {
                    rangeInputContainer.style.display = 'none';
                    rangeError.style.display = 'none';
                }
            });
        }

        dropzone.addEventListener("click", () => fileInput.click());
        dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
        dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
        dropzone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropzone.classList.remove("dragover");
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener("change", (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (file.type !== "application/pdf") { alert("Por favor, sube solo archivos PDF."); return; }
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                fileBytes = arrayBuffer;
                totalPages = pdfDoc.getPageCount();
                currentFile = file;
                fileNameDisplay.textContent = file.name;
                pageCountDisplay.textContent = `(${totalPages} páginas)`;
                dropzone.style.display = "none";
                optionsPanel.style.display = "block";
                actionBtn.style.display = "block";
                previewPanel.style.display = "none";
            } catch (error) {
                alert("Error al leer el PDF.");
                console.error(error);
            }
        }

        removeFileBtn.addEventListener("click", () => {
            currentFile = null; fileBytes = null; totalPages = 0; pendingBlob = null;
            fileInput.value = "";
            dropzone.style.display = "block";
            optionsPanel.style.display = "none";
            actionBtn.style.display = "none";
            previewPanel.style.display = "none";
            rangeError.style.display = 'none';
        });

        function parseRange(rangeStr, maxPages) {
            const pages = new Set();
            const parts = rangeStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (!part) continue;
                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    const start = parseInt(startStr, 10);
                    const end = parseInt(endStr, 10);
                    if (isNaN(start) || isNaN(end) || start > end || start < 1 || end > maxPages) return null;
                    for (let i = start; i <= end; i++) pages.add(i);
                } else {
                    const page = parseInt(part, 10);
                    if (isNaN(page) || page < 1 || page > maxPages) return null;
                    pages.add(page);
                }
            }
            return Array.from(pages);
        }

        actionBtn.addEventListener("click", async () => {
            if (!fileBytes) return;
            const isSpecific = document.querySelector('input[name="pageMode"]:checked').value === 'specific';
            let pagesToRotate = [];
            if (isSpecific) {
                pagesToRotate = parseRange(pageRangeInput.value, totalPages);
                if (!pagesToRotate || pagesToRotate.length === 0) { rangeError.style.display = 'block'; return; }
                rangeError.style.display = 'none';
            } else {
                for (let i = 1; i <= totalPages; i++) pagesToRotate.push(i);
            }
            const rotationValue = parseInt(document.querySelector('input[name="rotationAngle"]:checked').value, 10);

            try {
                actionBtn.disabled = true;
                actionBtn.textContent = "Procesando...";
                const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
                const pages = pdfDoc.getPages();
                for (let pageNum of pagesToRotate) {
                    const page = pages[pageNum - 1];
                    const currentRotation = page.getRotation().angle;
                    page.setRotation(PDFLib.degrees(currentRotation + rotationValue));
                }
                const pdfBytes = await pdfDoc.save();
                pendingBlob = new Blob([pdfBytes], { type: "application/pdf" });

                const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
                const pdfJsDoc = await loadingTask.promise;
                const firstPage = await pdfJsDoc.getPage(1);
                const viewport = firstPage.getViewport({ scale: 1.2 });
                previewCanvas.width = viewport.width;
                previewCanvas.height = viewport.height;
                await firstPage.render({ canvasContext: previewCanvas.getContext('2d'), viewport }).promise;

                previewPanel.style.display = "block";
                previewPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });

                actionBtn.disabled = false;
                actionBtn.textContent = "Aplicar Giro y Ver Previsualización";
            } catch (error) {
                alert("Error al procesar el PDF.");
                console.error(error);
                actionBtn.disabled = false;
                actionBtn.textContent = "Aplicar Giro y Ver Previsualización";
            }
        });

        downloadBtn.addEventListener("click", () => {
            if (!pendingBlob) return;
            const url = URL.createObjectURL(pendingBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Girado_${currentFile.name}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        cancelPreviewBtn.addEventListener("click", () => {
            previewPanel.style.display = "none";
            pendingBlob = null;
        });
    </script>
</body>
</html>
