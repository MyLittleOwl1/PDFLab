<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Marca de Agua al PDF</title>

    <!-- PDF-LIB para añadir la marca de agua -->
    <script src="pdf-lib.min.js"></script>

    <link rel="stylesheet" href="styles.css">
    <script src="theme.js"></script>

</head>

<body>

    <header>
        <h1>Añadir Marca de Agua</h1>
        <button class="theme-toggle" id="themeToggle" title="Alternar modo oscuro">
            <svg id="moonIcon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </header>

    <div class="content-wrapper">
        <div class="back-link-container">
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al menú
            </a>
        </div>

        <div id="dropzone">
            Arrastra y suelta tu archivo PDF aquí<br>o haz clic para seleccionar
            <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
        </div>

        <div id="optionsPanel" class="panel" style="display: none;">
            <div class="file-item">
                <span id="fileNameDisplay">documento.pdf</span>
                <span style="font-size: 14px; opacity: 0.8; margin-left: auto; margin-right: 15px;" id="pageCountDisplay"></span>
                <button class="delete-btn" id="removeFileBtn" title="Eliminar archivo">X</button>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid var(--file-item-border); padding-top: 15px;">
                <h3 style="margin-bottom: 15px; color: var(--h1-color);">Configuración de la Marca de Agua</h3>

                <div class="options-grid">
                    <div class="option-group" style="grid-column: 1 / -1;">
                        <label for="wmText">Texto de la marca de agua</label>
                        <input type="text" id="wmText" value="BORRADOR" maxlength="40" placeholder="BORRADOR, CONFIDENCIAL...">
                    </div>

                    <div class="option-group">
                        <label for="wmFontSize">Tamaño de fuente</label>
                        <input type="number" id="wmFontSize" value="60" min="10" max="200">
                    </div>

                    <div class="option-group">
                        <label for="wmColor">Color del texto</label>
                        <input type="color" id="wmColor" value="#ff0000">
                    </div>

                    <div class="option-group" style="grid-column: 1 / -1;">
                        <label>Opacidad: <span id="opacityValue">40</span>%</label>
                        <div class="slider-row">
                            <span>0%</span>
                            <input type="range" id="wmOpacity" min="5" max="100" value="40">
                            <span>100%</span>
                        </div>
                    </div>

                    <div class="option-group">
                        <label for="wmPosition">Posición</label>
                        <select id="wmPosition">
                            <option value="center" selected>Centro (diagonal)</option>
                            <option value="top-left">Arriba izquierda</option>
                            <option value="top-right">Arriba derecha</option>
                            <option value="bottom-left">Abajo izquierda</option>
                            <option value="bottom-right">Abajo derecha</option>
                        </select>
                    </div>

                    <div class="option-group">
                        <label for="wmRotation">Rotación (°)</label>
                        <input type="number" id="wmRotation" value="45" min="-360" max="360">
                    </div>
                </div>
            </div>
        </div>

        <button id="actionBtn" style="display: none;">Aplicar Marca de Agua y Descargar</button>
    </div>

    <script>
        // --- Marca de Agua Logic ---
        const dropzone = document.getElementById("dropzone");
        const fileInput = document.getElementById("fileInput");
        const optionsPanel = document.getElementById("optionsPanel");
        const fileNameDisplay = document.getElementById("fileNameDisplay");
        const removeFileBtn = document.getElementById("removeFileBtn");
        const actionBtn = document.getElementById("actionBtn");
        const pageCountDisplay = document.getElementById("pageCountDisplay");
        const wmOpacity = document.getElementById("wmOpacity");
        const opacityValue = document.getElementById("opacityValue");

        let currentFile = null;
        let fileBytes = null;
        let totalPages = 0;

        // Live opacity value display
        wmOpacity.addEventListener('input', () => {
            opacityValue.textContent = wmOpacity.value;
        });

        // Dropzone events
        dropzone.addEventListener("click", () => fileInput.click());
        dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
        dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
        dropzone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropzone.classList.remove("dragover");
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener("change", (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (file.type !== "application/pdf") {
                alert("Por favor, sube solo archivos PDF.");
                return;
            }

            try {
                const arrayBuffer = await file.arrayBuffer();
                const tempDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                totalPages = tempDoc.getPageCount();
                fileBytes = arrayBuffer;
                currentFile = file;

                fileNameDisplay.textContent = file.name;
                pageCountDisplay.textContent = `(${totalPages} páginas)`;

                dropzone.style.display = "none";
                optionsPanel.style.display = "block";
                actionBtn.style.display = "block";

            } catch (error) {
                alert("Error al leer el PDF. Puede estar protegido o corrupto.");
                console.error(error);
            }
        }

        removeFileBtn.addEventListener("click", () => {
            currentFile = null;
            fileBytes = null;
            totalPages = 0;
            fileInput.value = "";
            dropzone.style.display = "block";
            optionsPanel.style.display = "none";
            actionBtn.style.display = "none";
        });

        // Helper: Hex color (#rrggbb) → rgb 0..1
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return { r, g, b };
        }

        actionBtn.addEventListener("click", async () => {
            const text = document.getElementById("wmText").value.trim();
            if (!text) { alert("Escribe el texto de la marca de agua."); return; }

            const fontSize = parseInt(document.getElementById("wmFontSize").value) || 60;
            const opacity = parseInt(wmOpacity.value) / 100;
            const color = hexToRgb(document.getElementById("wmColor").value);
            const position = document.getElementById("wmPosition").value;
            const rotation = parseInt(document.getElementById("wmRotation").value) || 45;

            actionBtn.disabled = true;
            actionBtn.textContent = "Procesando...";

            try {
                const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
                const font = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
                const pages = pdfDoc.getPages();

                for (const page of pages) {
                    const { width, height } = page.getSize();

                    // Calcular anchura aproximada del texto para centrado
                    const textWidth = font.widthOfTextAtSize(text, fontSize);
                    const textHeight = fontSize;

                    let x, y, rotate;

                    switch (position) {
                        case 'center':
                            x = (width - textWidth) / 2;
                            y = (height - textHeight) / 2;
                            rotate = PDFLib.degrees(rotation);
                            break;
                        case 'top-left':
                            x = 30;
                            y = height - textHeight - 30;
                            rotate = PDFLib.degrees(0);
                            break;
                        case 'top-right':
                            x = width - textWidth - 30;
                            y = height - textHeight - 30;
                            rotate = PDFLib.degrees(0);
                            break;
                        case 'bottom-left':
                            x = 30;
                            y = 30;
                            rotate = PDFLib.degrees(0);
                            break;
                        case 'bottom-right':
                            x = width - textWidth - 30;
                            y = 30;
                            rotate = PDFLib.degrees(0);
                            break;
                        default:
                            x = (width - textWidth) / 2;
                            y = (height - textHeight) / 2;
                            rotate = PDFLib.degrees(rotation);
                    }

                    page.drawText(text, {
                        x,
                        y,
                        size: fontSize,
                        font,
                        color: PDFLib.rgb(color.r, color.g, color.b),
                        opacity,
                        rotate,
                    });
                }

                const pdfBytes = await pdfDoc.save();

                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `MarcaAgua_${currentFile.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                actionBtn.disabled = false;
                actionBtn.textContent = "Aplicar Marca de Agua y Descargar";

            } catch (error) {
                alert("Error al aplicar la marca de agua.");
                console.error(error);
                actionBtn.disabled = false;
                actionBtn.textContent = "Aplicar Marca de Agua y Descargar";
            }
        });
    </script>
</body>

</html>
