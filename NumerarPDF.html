<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerar Páginas PDF - Offline</title>

    <!-- PDF-LIB -->
    <script src="pdf-lib.min.js"></script>
    <!-- PDF.js para la previsualización -->
    <script src="pdf.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="theme.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';</script>

    <style>
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--h1-color);
        }

        select,
        input[type="text"],
        input[type="number"],
        input[type="color"] {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--file-item-border);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 15px;
            width: 100%;
        }

        #previewPanel {
            display: none;
            margin-top: 20px;
        }

        #previewPanel .preview-inner {
            border: 1px solid var(--file-item-border);
            border-radius: 10px;
            padding: 16px;
            background: var(--panel-bg);
            text-align: center;
        }

        #previewCanvas {
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .preview-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Numerar Páginas</h1>
        <button class="theme-toggle" id="themeToggle">
            <svg id="moonIcon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sunIcon" viewBox="0 0 24 24" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </header>

    <div class="content-wrapper">
        <div class="back-link-container">
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Volver al menú
            </a>
        </div>

        <div id="dropzone">
            Arrastra tu PDF aquí o haz clic para seleccionar
            <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
        </div>

        <div id="optionsPanel" class="panel" style="display: none;">
            <div class="file-item">
                <span id="fileNameDisplay">documento.pdf</span>
                <span style="font-size: 14px; opacity: 0.8; margin-left: auto; margin-right: 15px;" id="pageCountDisplay"></span>
                <button class="delete-btn" id="removeFileBtn">X</button>
            </div>

            <div class="options-grid">
                <div class="option-group">
                    <label>Posición</label>
                    <select id="position">
                        <option value="bottom-right" selected>Abajo Derecha</option>
                        <option value="bottom-center">Abajo Centro</option>
                        <option value="bottom-left">Abajo Izquierda</option>
                        <option value="top-right">Arriba Derecha</option>
                        <option value="top-center">Arriba Centro</option>
                        <option value="top-left">Arriba Izquierda</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>Formato</label>
                    <select id="format">
                        <option value="number" selected>Solo número (1)</option>
                        <option value="page-number">Página {n}</option>
                        <option value="number-total">{n} / {total}</option>
                        <option value="page-number-total">Pág. {n} de {total}</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>Tamaño de Fuente</label>
                    <input type="number" id="fontSize" value="12" min="6" max="72">
                </div>

                <div class="option-group">
                    <label>Color del Texto</label>
                    <input type="color" id="textColor" value="#000000">
                </div>

                <div class="option-group">
                    <label>Margen (puntos)</label>
                    <input type="number" id="margin" value="20" min="0" max="100">
                </div>

                <div class="option-group">
                    <label>Empezar en página...</label>
                    <input type="number" id="startNum" value="1" min="1">
                </div>
            </div>
        </div>

        <button id="actionBtn" style="display: none; margin-top: 30px;">Numerar y Ver Previsualización</button>

        <!-- Panel de Previsualización -->
        <div id="previewPanel">
            <div class="preview-inner">
                <h3>Vista previa (página 1)</h3>
                <canvas id="previewCanvas"></canvas>
                <div class="preview-actions">
                    <button class="btn-download" id="downloadBtn">⬇ Descargar PDF Numerado</button>
                    <button class="btn-cancel" id="cancelPreviewBtn">✕ Descartar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Numerar PDF Logic ---
        const dropzone = document.getElementById("dropzone");
        const fileInput = document.getElementById("fileInput");
        const optionsPanel = document.getElementById("optionsPanel");
        const fileNameDisplay = document.getElementById("fileNameDisplay");
        const removeFileBtn = document.getElementById("removeFileBtn");
        const actionBtn = document.getElementById("actionBtn");
        const pageCountDisplay = document.getElementById("pageCountDisplay");
        const previewPanel = document.getElementById("previewPanel");
        const previewCanvas = document.getElementById("previewCanvas");
        const downloadBtn = document.getElementById("downloadBtn");
        const cancelPreviewBtn = document.getElementById("cancelPreviewBtn");

        let currentFile = null;
        let totalPages = 0;
        let fileBytes = null;
        let pendingBlob = null;

        dropzone.addEventListener("click", () => fileInput.click());
        dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
        dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
        dropzone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropzone.classList.remove("dragover");
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener("change", (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (file.type !== "application/pdf") { alert("Por favor, sube solo archivos PDF."); return; }
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                fileBytes = arrayBuffer;
                totalPages = pdfDoc.getPageCount();
                currentFile = file;
                fileNameDisplay.textContent = file.name;
                pageCountDisplay.textContent = `(${totalPages} páginas)`;
                dropzone.style.display = "none";
                optionsPanel.style.display = "block";
                actionBtn.style.display = "block";
                previewPanel.style.display = "none";
            } catch (error) {
                alert("Error al leer el PDF.");
                console.error(error);
            }
        }

        removeFileBtn.addEventListener("click", () => {
            currentFile = null; fileBytes = null; totalPages = 0; pendingBlob = null;
            fileInput.value = "";
            dropzone.style.display = "block";
            optionsPanel.style.display = "none";
            actionBtn.style.display = "none";
            previewPanel.style.display = "none";
        });

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return PDFLib.rgb(r, g, b);
        }

        actionBtn.addEventListener("click", async () => {
            if (!fileBytes) return;

            const pos = document.getElementById("position").value;
            const formatType = document.getElementById("format").value;
            const fontSize = parseInt(document.getElementById("fontSize").value, 10);
            const colorHex = document.getElementById("textColor").value;
            const margin = parseInt(document.getElementById("margin").value, 10);
            const startNum = parseInt(document.getElementById("startNum").value, 10);

            try {
                actionBtn.disabled = true;
                actionBtn.textContent = "Procesando...";

                const pdfDoc = await PDFLib.PDFDocument.load(fileBytes);
                const pages = pdfDoc.getPages();
                const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
                const color = hexToRgb(colorHex);

                for (let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    const { width, height } = page.getSize();
                    const n = startNum + i;
                    
                    let text = "";
                    if (formatType === "number") text = `${n}`;
                    else if (formatType === "page-number") text = `Página ${n}`;
                    else if (formatType === "number-total") text = `${n} / ${totalPages}`;
                    else if (formatType === "page-number-total") text = `Pág. ${n} de ${totalPages}`;

                    const textWidth = font.widthOfTextAtSize(text, fontSize);
                    
                    let x, y;
                    // X Position
                    if (pos.includes("left")) x = margin;
                    else if (pos.includes("center")) x = (width / 2) - (textWidth / 2);
                    else x = width - textWidth - margin;

                    // Y Position
                    if (pos.includes("bottom")) y = margin;
                    else y = height - fontSize - margin;

                    page.drawText(text, { x, y, size: fontSize, font, color });
                }

                const pdfBytes = await pdfDoc.save();
                pendingBlob = new Blob([pdfBytes], { type: "application/pdf" });

                // Preview
                const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
                const pdfJsDoc = await loadingTask.promise;
                const firstPage = await pdfJsDoc.getPage(1);
                const viewport = firstPage.getViewport({ scale: 1.2 });
                previewCanvas.width = viewport.width;
                previewCanvas.height = viewport.height;
                await firstPage.render({ canvasContext: previewCanvas.getContext('2d'), viewport }).promise;

                previewPanel.style.display = "block";
                previewPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });

                actionBtn.disabled = false;
                actionBtn.textContent = "Numerar y Ver Previsualización";

            } catch (error) {
                alert("Error al procesar el PDF.");
                console.error(error);
                actionBtn.disabled = false;
                actionBtn.textContent = "Numerar y Ver Previsualización";
            }
        });

        downloadBtn.addEventListener("click", () => {
            if (!pendingBlob) return;
            const url = URL.createObjectURL(pendingBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Numerado_${currentFile.name}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        cancelPreviewBtn.addEventListener("click", () => {
            previewPanel.style.display = "none";
            pendingBlob = null;
        });
    </script>
</body>

</html>
